apis:
  - aid: ouvert-canada-ca:catalog
    name: Gouvernement ouvert Canada (FR) CKAN Action API
    description: >-
      CKAN Action API for Gouvernement ouvert Canada (FR), a consistent JSON-over-HTTP interface over a catalog of 47,344 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://ouvert.canada.ca/data/api/3/action/.
