aid: ouvert-canada-ca
name: Gouvernement ouvert Canada (FR)
description: >-
  Gouvernement ouvert Canada (FR) is a national government open-data portal for Canada running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 47,344 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
